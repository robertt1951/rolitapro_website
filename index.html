<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RolitaPro Technologies LLC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .hero-bg { background: linear-gradient(135deg, #0F172A 0%, #10B981 100%); }
        .card:hover { transform: translateY(-12px); box-shadow: 0 25px 50px -12px rgb(16 185 129 / 0.25); }
    </style>
</head>
<body class="bg-zinc-50 font-sans">

    <!-- Navigation, Hero, Solutions, Industries remain the same as your current code -->

    <!-- Contact Form -->
    <section id="contact" class="py-24 bg-slate-900 text-white">
        <div class="max-w-2xl mx-auto px-6 text-center">
            <h2 class="text-4xl font-bold mb-6">Ready to Get Started?</h2>
            <p class="text-emerald-100 text-xl mb-12">Let’s build the perfect SaaS solution for your business.</p>
            
            <form id="contactForm" class="space-y-6">
                <input type="text" id="name" placeholder="Your Name" required class="w-full px-6 py-4 bg-slate-800 border border-slate-700 rounded-3xl focus:outline-none focus:border-emerald-500 text-white">
                <input type="email" id="email" placeholder="Business Email" required class="w-full px-6 py-4 bg-slate-800 border border-slate-700 rounded-3xl focus:outline-none focus:border-emerald-500 text-white">
                <textarea id="message" rows="5" placeholder="Tell us about your needs..." required class="w-full px-6 py-4 bg-slate-800 border border-slate-700 rounded-3xl focus:outline-none focus:border-emerald-500 text-white"></textarea>
                
                <button type="submit" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 py-5 rounded-3xl font-semibold text-lg transition-colors">
                    Send Message
                </button>
            </form>
            <p id="status" class="mt-6 text-sm"></p>
        </div>
    </section>

    <footer class="bg-slate-950 text-slate-400 py-12 text-center">
        <p>© 2026 RolitaPro Technologies LLC. All rights reserved.</p>
    </footer>

    <script>
        const SUPABASE_URL = 'https://ropvjcayvtyopcctygqv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvcHZqY2F5dnR5b3BjY3R5Z3F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTI1NjcsImV4cCI6MjA4OTQyODU2N30.l0r8iLII21JXnukKXZJXv20e8Hx6SR0fS_RSs1ZdJVY';   // ←←← PASTE YOUR FULL ANON KEY HERE

        console.log("=== Form Debug Started ===");
        console.log("URL:", SUPABASE_URL);
        console.log("Key length:", SUPABASE_ANON_KEY.length);

        const form = document.getElementById('contactForm');
        const status = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            console.log("Submit button clicked!");

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            status.textContent = '';

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const message = document.getElementById('message').value.trim();

            if (!SUPABASE_ANON_KEY) {
                status.innerHTML = '<span class="text-red-400">❌ Anon key is missing. Please check the code.</span>';
                console.error("Anon key is empty!");
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Message';
                return;
            }

            try {
                console.log("Sending data to Supabase...");
                const res = await fetch(`${SUPABASE_URL}/rest/v1/contact_messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    },
                    body: JSON.stringify({ name, email, message })
                });

                const responseText = await res.text();
                console.log("Response status:", res.status);
                console.log("Response body:", responseText);

                if (res.ok) {
                    status.innerHTML = '<span class="text-emerald-400">✅ Message sent successfully! Thank you.</span>';
                    form.reset();
                    console.log("Success!");
                } else {
                    status.innerHTML = `<span class="text-red-400">❌ Failed (${res.status}). Check console.</span>`;
                    console.error("Error response:", responseText);
                }
            } catch (err) {
                status.innerHTML = '<span class="text-red-400">❌ Network error. Check console for details.</span>';
                console.error("Catch error:", err);
            }

            submitBtn.disabled = false;
            submitBtn.textContent = 'Send Message';
        });

        function toggleMenu() {
            document.getElementById('mobileMenu').classList.toggle('hidden');
        }
    </script>
</body>
</html>
