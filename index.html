<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RolitaPro Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 p-8">

    <h1 class="text-4xl font-bold mb-8">RolitaPro Contact Form Test</h1>

    <form id="contactForm" class="max-w-md space-y-6">
        <input type="text" id="name" placeholder="Your Name" required class="w-full px-6 py-4 border rounded-3xl">
        <input type="email" id="email" placeholder="Email" required class="w-full px-6 py-4 border rounded-3xl">
        <textarea id="message" rows="5" placeholder="Message" required class="w-full px-6 py-4 border rounded-3xl"></textarea>
        
        <button type="submit" id="submitBtn" class="w-full bg-emerald-600 text-white py-5 rounded-3xl font-semibold">
            Send Message
        </button>
    </form>

    <p id="status" class="mt-6 text-lg"></p>

    <script>
        const form = document.getElementById('contactForm');
        const status = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            submitBtn.textContent = 'Sending...';
            status.innerHTML = '<span class="text-blue-500">Button clicked! Testing JavaScript...</span>';

            setTimeout(() => {
                status.innerHTML = '<span class="text-emerald-500 font-medium">✅ Test successful! JavaScript is working.</span>';
                form.reset();
                submitBtn.textContent = 'Send Message';
            }, 1000);
        });
    </script>
</body>
</html>
