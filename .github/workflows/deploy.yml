# Deploy RolitaPro Secure
name: Deploy RolitaPro Secure

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Replace placeholders
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python3 -c "
          import os
          with open('index.html', 'r') as f:
              content = f.read()
          content = content.replace('SUPABASE_ANON_KEY_PLACEHOLDER', os.environ['SUPABASE_ANON_KEY'].strip())
          with open('index.html', 'w') as f:
              f.write(content)
          "

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./
          branch: gh-pages
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}
